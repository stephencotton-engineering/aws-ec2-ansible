# Inventory file — defines the target EC2 instances Ansible will connect to

# Web server group — add your EC2 public IPs here
[webservers]
web1 ansible_host=10.0.1.10
web2 ansible_host=10.0.1.11

# Variables that apply to all hosts in the webservers group
[webservers:vars]
ansible_user=ec2-user
ansible_ssh_private_key_file=~/.ssh/your-key.pem
ansible_python_interpreter=/usr/bin/python3

# All servers group — useful for running playbooks across everything
[all:vars]
ansible_user=ec2-user
