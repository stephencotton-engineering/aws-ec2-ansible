[defaults]
# Location of the inventory file
inventory = inventory/hosts.ini

# Default remote user for SSH connections
remote_user = ec2-user

# Location of the SSH private key
private_key_file = ~/.ssh/your-key.pem

# Disable host key checking so Ansible doesn't prompt on first connection
host_key_checking = False

# Show task timing information after each playbook run
callback_whitelist = timer

[ssh_connection]
# Speed up SSH connections by reusing existing connections
pipelining = True
